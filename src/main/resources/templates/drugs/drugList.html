<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'drugs')}">

<body>

  <h2 th:text="#{drugs}">Drugs</h2>

  <form th:action="@{/drugs.html}" method="get" class="form-horizontal" id="drug-results-search-form">
    <div class="form-group">
      <div class="control-group">
        <label class="col-sm-2 control-label" for="drug-results-q" th:text="#{drugSearchQuery}">Name or Category</label>
        <div class="col-sm-10">
          <input class="form-control" id="drug-results-q" name="q" th:value="${q}" size="30" maxlength="80" />
        </div>
      </div>
    </div>
    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10">
        <button type="submit" class="btn btn-primary" th:text="#{findDrugs}">Find Drugs</button>
      </div>
    </div>
  </form>

  <table id="drugs" class="table table-striped">
    <thead>
      <tr>
        <th th:text="#{name}">Name</th>
        <th th:text="#{category}">Category</th>
        <th th:text="#{form}">Form</th>
        <th th:text="#{price}">Price</th>
        <th th:text="#{description}">Description</th>
      </tr>
    </thead>
    <tbody>
      <tr th:if="${#lists.isEmpty(listDrugs)}">
        <td colspan="5" th:text="#{noDrugsFound}">No drugs found</td>
      </tr>
      <tr th:each="drug : ${listDrugs}">
        <td>
          <a th:href="@{/drugs/{drugId}(drugId=${drug.id},q=${q},page=${currentPage})}" th:text="${drug.name}">Drug Name</a>
        </td>
        <td th:text="${drug.category}">Category</td>
        <td th:text="${drug.form}">Form</td>
        <td th:text="${#numbers.formatDecimal(drug.price, 1, 2)}">0.00</td>
        <td th:text="${drug.description}">Description</td>
      </tr>
    </tbody>
  </table>
  <div th:if="${totalPages > 1}">
    <span th:text="#{pages}">Pages:</span>
    <span>[</span>
    <span th:each="i: ${#numbers.sequence(1, totalPages)}">
      <a th:if="${currentPage != i}" th:href="@{/drugs.html(q=${q},page=${i})}">[[${i}]]</a>
      <span th:unless="${currentPage != i}">[[${i}]]</span>
    </span>
    <span>]&nbsp;</span>
    <span>
      <a th:if="${currentPage > 1}" th:href="@{/drugs.html(q=${q},page=1)}" th:title="#{first}"
        class="fa fa-fast-backward"></a>
      <span th:unless="${currentPage > 1}" th:title="#{first}" class="fa fa-fast-backward"></span>
    </span>
    <span>
      <a th:if="${currentPage > 1}" th:href="@{/drugs.html(q=${q},page=${currentPage - 1})}" th:title="#{previous}"
        class="fa fa-step-backward"></a>
      <span th:unless="${currentPage > 1}" th:title="#{previous}" class="fa fa-step-backward"></span>
    </span>
    <span>
      <a th:if="${currentPage < totalPages}" th:href="@{/drugs.html(q=${q},page=${currentPage + 1})}" th:title="#{next}"
        class="fa fa-step-forward"></a>
      <span th:unless="${currentPage < totalPages}" th:title="#{next}" class="fa fa-step-forward"></span>
    </span>
    <span>
      <a th:if="${currentPage < totalPages}" th:href="@{/drugs.html(q=${q},page=${totalPages})}" th:title="#{last}"
        class="fa fa-fast-forward"></a>
      <span th:unless="${currentPage < totalPages}" th:title="#{last}" class="fa fa-fast-forward"></span>
    </span>
  </div>

</body>

</html>
