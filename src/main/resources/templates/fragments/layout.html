<!DOCTYPE html>

<html th:fragment="layout (template, menu)" xmlns:th="https://www.thymeleaf.org">

<head>

  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="shortcut icon" type="image/x-icon" th:href="@{/resources/images/favicon.png}">
  <title th:text="#{layoutTitle}">PetClinic :: a Spring Framework demonstration</title>
  <link th:href="@{/webjars/font-awesome/css/font-awesome.min.css}" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/resources/css/petclinic.css}" />

</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-dark" role="navigation">
    <div class="container-fluid">
      <a class="navbar-brand" th:href="@{/}"><span></span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#main-navbar">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="main-navbar" style>

        <ul class="navbar-nav me-auto mb-2 mb-lg-0" th:remove="all">

          <li th:fragment="menuItem (link,active,title,glyph,text)" th:class="nav-item">
            <a th:class="${active==menu ? 'nav-link active' : 'nav-link'}" th:href="@{__${link}__}" th:title="${title}">
              <span th:class="'fa fa-'+${glyph}" class="fa fa-home"></span>
              <span th:text="${text}">Template</span>
            </a>
          </li>

        </ul>

        <ul class="nav navbar-nav me-auto">

          <li th:replace="~{::menuItem ('/','home','home page','home',#{home})}">
            <span class="fa fa-home" aria-hidden="true"></span>
            <span th:text="#{home}">Home</span>
          </li>

          <li th:replace="~{::menuItem ('/owners/find','owners','find owners','search',#{findOwners})}">
            <span class="fa fa-search" aria-hidden="true"></span>
            <span th:text="#{findOwners}">Find owners</span>
          </li>

          <li th:replace="~{::menuItem ('/vets.html','vets','veterinarians','th-list',#{vets})}">
            <span class="fa fa-th-list" aria-hidden="true"></span>
            <span th:text="#{vets}">Veterinarians</span>
          </li>

          <li
            th:replace="~{::menuItem ('/oups','error','trigger a RuntimeException to see how it is handled','exclamation-triangle',#{error})}">
            <span class="fa exclamation-triangle" aria-hidden="true"></span>
            <span th:text="#{error}">Error</span>
          </li>

        </ul>

        <ul class="navbar-nav ms-auto">
          <li class="nav-item dropdown">
            <button class="btn nav-link dropdown-toggle" type="button" id="languageDropdown"
              data-bs-toggle="dropdown" aria-expanded="false" aria-label="Select language">
              <span class="fa fa-globe" aria-hidden="true"></span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="languageDropdown"
              th:with="currentLang=${#locale.language}">
              <li><a class="dropdown-item" th:href="@{''(lang=en)}" th:text="#{lang.en}" th:attr="aria-current=${currentLang == 'en' ? 'true' : null}">English</a></li>
              <li><a class="dropdown-item" th:href="@{''(lang=de)}" th:text="#{lang.de}" th:attr="aria-current=${currentLang == 'de' ? 'true' : null}">Deutsch</a></li>
              <li><a class="dropdown-item" th:href="@{''(lang=es)}" th:text="#{lang.es}" th:attr="aria-current=${currentLang == 'es' ? 'true' : null}">Español</a></li>
              <li><a class="dropdown-item" th:href="@{''(lang=fa)}" th:text="#{lang.fa}" th:attr="aria-current=${currentLang == 'fa' ? 'true' : null}">فارسی</a></li>
              <li><a class="dropdown-item" th:href="@{''(lang=ko)}" th:text="#{lang.ko}" th:attr="aria-current=${currentLang == 'ko' ? 'true' : null}">한국어</a></li>
              <li><a class="dropdown-item" th:href="@{''(lang=pt)}" th:text="#{lang.pt}" th:attr="aria-current=${currentLang == 'pt' ? 'true' : null}">Português</a></li>
              <li><a class="dropdown-item" th:href="@{''(lang=ru)}" th:text="#{lang.ru}" th:attr="aria-current=${currentLang == 'ru' ? 'true' : null}">Русский</a></li>
              <li><a class="dropdown-item" th:href="@{''(lang=tr)}" th:text="#{lang.tr}" th:attr="aria-current=${currentLang == 'tr' ? 'true' : null}">Türkçe</a></li>
            </ul>
          </li>
        </ul>

      </div>
    </div>
  </nav>
  <div class="container-fluid">
    <div class="container xd-container">

      <th:block th:insert="${template}" />

      <br />
      <br />
      <div class="container">
        <div class="row">
          <div class="col-12 text-center">
            <img src="../static/images/spring-logo.svg" th:src="@{/resources/images/spring-logo.svg}"
              alt="VMware Tanzu Logo" class="logo">
          </div>
        </div>
      </div>
    </div>
  </div>

  <script th:src="@{/webjars/bootstrap/dist/js/bootstrap.bundle.min.js}"></script>

</body>

</html>
